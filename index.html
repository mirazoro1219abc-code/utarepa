<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#faf7f2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="うたレパ">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<title>🎤 うたレパ — 歌のレパートリー帳</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #2d2a26;
    --sub: #8a837a;
    --line: #e8e2d8;
    --accent: #e5533d;
    --accent-soft: #fdeae6;
    --star: #f5b301;
    --radius: 14px;
    --shadow: 0 2px 10px rgba(60,50,40,.08);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
  }
  header {
    position: sticky; top: 0; z-index: 20;
    background: rgba(250,247,242,.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
    padding: 8px 14px 8px;
  }
  .header-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  h1 { font-size: 19px; margin: 0; letter-spacing: .5px; }
  .stats { font-size: 12px; color: var(--sub); }
  .spacer { flex: 1; }
  .controls { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; align-items: center; }
  input[type=search], select, input[type=text], input[type=date], textarea {
    font: inherit; color: var(--ink);
    border: 1px solid var(--line); border-radius: 8px;
    padding: 7px 10px; background: #fff; outline: none;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); }
  input[type=search] { min-width: 200px; flex: 1; max-width: 320px; }
  button {
    font: inherit; cursor: pointer; border: 1px solid var(--line);
    background: #fff; color: var(--ink); border-radius: 8px; padding: 7px 14px;
    transition: background .15s;
  }
  button:hover { background: #f4efe7; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: bold; }
  button.primary:hover { background: #d04530; }
  button.danger { color: #c0392b; border-color: #eccfcb; }
  button.danger:hover { background: #fdf0ee; }

  /* ---- song card grid ---- */
  main { padding: 20px; max-width: 1100px; margin: 0 auto; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 14px 16px; cursor: pointer; box-shadow: var(--shadow);
    transition: transform .12s, box-shadow .12s;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(60,50,40,.13); }
  .card .title { font-weight: bold; font-size: 16px; margin-bottom: 2px; }
  .card .artist { color: var(--sub); font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card .artist .aname { min-width: 0; }
  .favmark { font-size: 13px; margin-left: auto; }
  .tagwrap { position: relative; margin-bottom: 6px; }
  #f-tagBtn { width: 100%; text-align: left; }
  .tagboxes {
    display: none; position: absolute; z-index: 30; left: 0; top: 100%; margin-top: 4px;
    background: #fff; border: 1px solid var(--line); border-radius: 10px;
    box-shadow: 0 6px 18px rgba(0,0,0,.14); padding: 10px 12px;
    flex-direction: column; gap: 7px; font-size: 14px; min-width: 170px;
  }
  .tagboxes.show { display: flex; }
  .tagboxes label { white-space: nowrap; cursor: pointer; }
  .card .meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; font-size: 12px; }
  .badge { padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: bold; }
  .badge.ok    { background: #e3f4e5; color: #2e7d43; }
  .badge.prac  { background: #fdf3d7; color: #a3720a; }
  .badge.want  { background: #e8ecfb; color: #4a5cb8; }
  .keychip { background: #f4efe7; border-radius: 6px; padding: 1px 7px; color: #6b6459; }
  .stars { color: var(--star); letter-spacing: 1px; font-size: 14px; }
  .stars .off { color: #ddd6ca; }
  .tagchip { background: var(--accent-soft); color: #b04530; border-radius: 999px; padding: 1px 8px; font-size: 11px; }
  .empty { text-align: center; color: var(--sub); padding: 60px 0; }

  /* ---- detail view ---- */
  #detailView { max-width: 800px; margin: 0 auto; padding: 20px; }
  .detail-nav { display: flex; gap: 8px; margin-bottom: 16px; }
  .panel {
    background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 18px 20px; box-shadow: var(--shadow); margin-bottom: 16px;
  }
  .field-row { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--sub); font-weight: bold; }
  .field.grow { flex: 1; min-width: 180px; }
  #f-title { font-size: 18px; font-weight: bold; }
  .rating-widget { font-size: 26px; cursor: pointer; user-select: none; line-height: 1; }
  .rating-widget span { color: #ddd6ca; transition: color .1s; }
  .rating-widget span.on { color: var(--star); }
  textarea#f-memo { width: 100%; min-height: 70px; resize: vertical; }

  /* ---- lyrics & annotations ---- */
  .toolbar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; align-items: center; }
  #lyricsTools { display: none; }
  #lyricsTools.show { display: contents; }
  .annbtn { font-size: 12px; padding: 4px 10px; border-radius: 999px; border-width: 2px; }
  #lyrics {
    min-height: 220px; white-space: pre-wrap; font-size: 16px; line-height: 2.2;
    border: 1px dashed transparent; border-radius: 8px; padding: 10px;
  }
  #lyrics.editing { border-color: var(--accent); background: #fffdf8; outline: none; }
  #lyrics:empty::before { content: "（歌詞未登録 — 「歌詞を編集」を押して貼り付け）"; color: var(--sub); }

  .ann { border-radius: 3px; padding: 0 1px; cursor: pointer; }
  .ann-shakuri  { text-decoration: underline wavy #e67e22 2px; text-underline-offset: 4px; }
  .ann-fall     { text-decoration: underline wavy #3498db 2px; text-underline-offset: 4px; }
  .ann-kobushi  { text-decoration: underline double #9b59b6 2px; text-underline-offset: 4px; }
  .ann-vibrato  { text-decoration: underline wavy #16a085 2px; text-underline-offset: 4px; }
  .ann-falsetto { background: #fde3ef; }
  .ann-accent   { color: #e74c3c; font-weight: bold; }
  .ann-tame     { text-decoration: underline dashed #27ae60 2px; text-underline-offset: 4px; }
  .ann-note     { background: #fff3c4; border-bottom: 2px dotted #b8860b; }
  .breath       { color: #2980b9; font-weight: bold; cursor: pointer; margin: 0 1px; }

  /* toolbar button colors matching */
  .palbtn { font-size: 12px; padding: 4px 10px; border-radius: 999px; border-width: 2px; }
  .annbtn[data-type=shakuri],  .palbtn[data-type=shakuri]  { border-color: #e67e22; color: #b35c0e; }
  .annbtn[data-type=fall],     .palbtn[data-type=fall]     { border-color: #3498db; color: #1f6da8; }
  .annbtn[data-type=kobushi],  .palbtn[data-type=kobushi]  { border-color: #9b59b6; color: #7a3fa0; }
  .annbtn[data-type=vibrato],  .palbtn[data-type=vibrato]  { border-color: #16a085; color: #0e7a63; }
  .annbtn[data-type=falsetto], .palbtn[data-type=falsetto] { border-color: #e84393; color: #c22a75; }
  .annbtn[data-type=accent],   .palbtn[data-type=accent]   { border-color: #e74c3c; color: #c0392b; }
  .annbtn[data-type=tame],     .palbtn[data-type=tame]     { border-color: #27ae60; color: #1d8046; }
  .annbtn[data-type=note],     .palbtn[data-type=note]     { border-color: #b8860b; color: #96700a; }
  .annbtn[data-type=breath],   .palbtn[data-type=breath]   { border-color: #2980b9; color: #2273a5; }

  /* ---- 歌詞カード全画面 ---- */
  #cardOverlay {
    position: fixed; inset: 0; z-index: 70; background: var(--bg);
    display: none; flex-direction: column;
  }
  #cardOverlay.show { display: flex; }
  #cardOverlay .card-bar {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid var(--line); background: var(--card);
  }
  #cardTitle { font-weight: bold; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #cardLyrics {
    flex: 1; overflow-y: auto; padding: 20px 22px 60px;
    white-space: pre-wrap; font-size: 26px; line-height: 2.4;
  }
  #cardLyrics:empty::before { content: "歌詞がまだありません"; color: var(--sub); font-size: 16px; }

  /* ---- タップ式パレット（歌詞カード作り） ---- */
  #tapPalette {
    position: absolute; z-index: 50; background: #fff; border: 1px solid var(--line);
    border-radius: 12px; box-shadow: 0 6px 20px rgba(0,0,0,.18); padding: 10px 12px;
    max-width: 320px; display: none;
  }
  #tapPalette .ptype { font-weight: bold; font-size: 13px; margin-bottom: 8px; }
  #tapPalette .palbtns { display: flex; gap: 6px; flex-wrap: wrap; }

  /* ---- 曲検索モーダル（デンモク風） ---- */
  #modalBack {
    position: fixed; inset: 0; background: rgba(40,30,20,.45); z-index: 60;
    display: none; align-items: flex-start; justify-content: center; padding: 50px 14px 14px;
  }
  #modalBack.show { display: flex; }
  #searchModal {
    background: #fff; border-radius: 16px; width: 100%; max-width: 540px;
    max-height: 82vh; display: flex; flex-direction: column;
    box-shadow: 0 10px 40px rgba(0,0,0,.25);
  }
  #searchModal .mhead { padding: 14px 16px 12px; border-bottom: 1px solid var(--line); }
  #searchModal .mrow { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
  #searchModal .mrow .arow { display: flex; gap: 8px; }
  #qTitle { width: 100%; }
  #qArtist { flex: 1; min-width: 0; }
  #results { overflow-y: auto; padding: 8px; flex: 1; }
  .result { display: flex; gap: 10px; align-items: center; padding: 8px; border-radius: 10px; cursor: pointer; }
  .result:hover { background: #f7f2ea; }
  .result img { width: 48px; height: 48px; border-radius: 8px; flex-shrink: 0; background: #f1ebe1; }
  .result .r-info { flex: 1; min-width: 0; }
  .result .r-info div { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .result .r-title { font-weight: bold; font-size: 14px; }
  .result .r-artist { font-size: 12px; color: var(--sub); }
  .result .r-album { font-size: 11px; color: #b3aca1; }
  .previewBtn { flex-shrink: 0; border-radius: 999px; width: 36px; height: 36px; padding: 0; }
  .mfoot {
    padding: 10px 14px; border-top: 1px solid var(--line);
    display: flex; gap: 8px; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--sub); flex-wrap: wrap;
  }
  .mfoot .btns { display: flex; gap: 8px; }

  /* ---- カード：曲名の横にステータス表示 ---- */
  .card .titlerow { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 2px; }
  .card .titlerow .title { margin-bottom: 0; }

  /* ---- 文字サイズ小（コンパクト表示） ---- */
  body.compact .grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 8px; }
  body.compact .card { padding: 7px 10px; }
  body.compact .card .title { font-size: 13px; }
  body.compact .card .artist { font-size: 11px; margin-bottom: 3px; }
  body.compact .card .meta { font-size: 10px; gap: 5px; }
  body.compact .stars { font-size: 11px; }
  body.compact .badge { font-size: 9px; padding: 1px 6px; }
  body.compact .tagchip { font-size: 9px; }

  /* ---- 選択モード（一括削除） ---- */
  .selbox { display: none; pointer-events: none; width: 16px; height: 16px; }
  body.selecting .selbox { display: inline-block; }
  .card.selected { outline: 3px solid var(--accent); }
  #deleteBar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
    background: #fff; border-top: 1px solid var(--line); padding: 10px 16px;
    display: none; gap: 10px; align-items: center; justify-content: center;
    box-shadow: 0 -4px 14px rgba(0,0,0,.1);
  }
  body.selecting #deleteBar { display: flex; }

  /* ---- popover ---- */
  #popover {
    position: absolute; z-index: 50; background: #fff; border: 1px solid var(--line);
    border-radius: 10px; box-shadow: 0 6px 20px rgba(0,0,0,.15); padding: 10px 12px;
    font-size: 13px; max-width: 260px; display: none;
  }
  #popover .ptype { font-weight: bold; margin-bottom: 4px; }
  #popover .pnote { color: #5a5347; margin-bottom: 8px; white-space: pre-wrap; }
  #popover .pbtns { display: flex; gap: 6px; }
  #popover button { padding: 3px 10px; font-size: 12px; }

  /* ---- toast ---- */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--ink); color: #fff; padding: 9px 20px; border-radius: 999px;
    font-size: 13px; opacity: 0; transition: all .25s; z-index: 100; pointer-events: none;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    main, #detailView { padding: 10px; }
    input[type=search] { min-width: 110px; }
    header { padding: 6px 10px 6px; }
    .header-top { gap: 7px; }
    h1 { font-size: 16px; }
    .stats { font-size: 10px; }
    .controls { gap: 5px; margin-top: 5px; }
    button { padding: 4px 9px; font-size: 12px; border-radius: 7px; }
    /* iOSで入力欄タップ時に画面が勝手に拡大しないよう16px以上にする */
    input[type=search], select, input[type=text], input[type=date], textarea { padding: 5px 8px; font-size: 16px; }
    .grid { gap: 9px; }
    .card { padding: 10px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>🎤 うたレパ</h1>
    <span class="stats" id="stats"></span>
    <span class="spacer"></span>
  </div>
  <div class="controls">
    <button id="homeBtn" title="曲一覧の先頭に戻る（検索・絞り込みもリセット）">🏠 ホーム</button>
    <button id="fontToggle" title="文字の大きさを2段階で切り替え。小さくするとたくさんの曲が一度に見られます">文字サイズ</button>
    <button id="menuExport" title="全データをファイルに保存します。別の端末への移動や、万一の消失に備えるバックアップ用">バックアップ</button>
    <button id="menuImport" title="「バックアップ」で作ったファイルを読み込んでデータを復元します">復元</button>
    <input type="file" id="importFile" accept=".json" hidden>
  </div>
  <div class="controls" id="listControls">
    <input type="search" id="search" placeholder="曲名・アーティスト・タグで検索">
    <select id="filterStatus">
      <option value="all">すべて</option>
      <option value="盛り上がる">盛り上がる</option>
      <option value="バラード">バラード</option>
      <option value="バンド">バンド</option>
      <option value="ボカロ">ボカロ</option>
      <option value="アイドル">アイドル</option>
      <option value="洋楽">洋楽</option>
      <option value="アニソン">アニソン</option>
      <option value="練習中">練習中</option>
    </select>
    <select id="sortBy">
      <option value="added">追加順</option>
      <option value="fav">お気に入り順</option>
      <option value="rating">評価が高い順</option>
      <option value="title">曲名順</option>
      <option value="artist">アーティスト順</option>
    </select>
    <button id="selectBtn">選択</button>
    <button class="primary" id="addSong">＋ 曲を追加</button>
  </div>
</header>

<main id="listView">
  <div class="grid" id="grid"></div>
  <div class="empty" id="emptyMsg" hidden>曲がまだありません。「＋ 曲を追加」から登録しましょう 🎶</div>
</main>

<section id="detailView" hidden>
  <div class="detail-nav">
    <button id="backBtn">← 一覧に戻る</button>
    <span class="spacer"></span>
    <button id="favBtn">☆ お気に入り</button>
    <button class="danger" id="deleteBtn">🗑 この曲を削除</button>
  </div>

  <div class="panel">
    <div class="field-row">
      <div class="field grow">
        <label>曲名</label>
        <input type="text" id="f-title" placeholder="曲名">
      </div>
      <div class="field grow">
        <label>アーティスト</label>
        <input type="text" id="f-artist" placeholder="アーティスト">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>キー設定</label>
        <select id="f-key" style="width:120px">
          <option value="">未設定</option>
          <option value="原キー">原キー</option>
          <option value="+6">+6</option>
          <option value="+5">+5</option>
          <option value="+4">+4</option>
          <option value="+3">+3</option>
          <option value="+2">+2</option>
          <option value="+1">+1</option>
          <option value="-1">-1</option>
          <option value="-2">-2</option>
          <option value="-3">-3</option>
          <option value="-4">-4</option>
          <option value="-5">-5</option>
          <option value="-6">-6</option>
        </select>
      </div>
      <div class="field">
        <label>自己評価</label>
        <div class="rating-widget" id="f-rating"><span>★</span><span>★</span><span>★</span><span>★</span><span>★</span></div>
      </div>
      <div class="field grow">
        <label>タグ</label>
        <div class="tagwrap">
          <button type="button" id="f-tagBtn">タグを選ぶ ▾</button>
          <div id="f-tagboxes" class="tagboxes"></div>
        </div>
        <input type="text" id="f-tags" placeholder="その他のタグ（カンマ区切り・自由入力）">
      </div>
    </div>
    <div class="field">
      <label>歌い方メモ（全体）</label>
      <textarea id="f-memo" placeholder="サビ前はブレス多め、2番Aメロは抑えめ…など"></textarea>
    </div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <button id="editLyricsBtn">✏️ 歌詞を編集</button>
      <button id="lyricsCardBtn">🎴 歌詞カード（全画面）</button>
      <span id="lyricsTools">
        <button id="findLyricsUta">🔎 歌ネットで歌詞を探す</button>
        <button id="findLyricsGoogle">🔎 Google検索</button>
        <button class="annbtn" data-type="shakuri">しゃくり</button>
        <button class="annbtn" data-type="fall">フォール</button>
        <button class="annbtn" data-type="kobushi">こぶし</button>
        <button class="annbtn" data-type="vibrato">ビブラート</button>
        <button class="annbtn" data-type="falsetto">ファルセット</button>
        <button class="annbtn" data-type="accent">アクセント</button>
        <button class="annbtn" data-type="tame">ため</button>
        <button class="annbtn" data-type="note">📝 メモ</button>
        <button class="annbtn" data-type="breath">∨ ブレス挿入</button>
      </span>
    </div>
    <div id="lyrics"></div>
  </div>
</section>

<div id="deleteBar">
  <span id="selCount">0曲選択中</span>
  <button id="favSelected">⭐ お気に入り</button>
  <button class="danger" id="deleteSelected">🗑 削除</button>
  <button id="cancelSelect">キャンセル</button>
</div>

<div id="tapPalette">
  <div class="ptype">「<span id="tapChar"></span>」に印を付ける</div>
  <div class="palbtns">
    <button class="palbtn" data-t="shakuri" data-type="shakuri">しゃくり</button>
    <button class="palbtn" data-t="fall" data-type="fall">フォール</button>
    <button class="palbtn" data-t="kobushi" data-type="kobushi">こぶし</button>
    <button class="palbtn" data-t="vibrato" data-type="vibrato">ビブラート</button>
    <button class="palbtn" data-t="falsetto" data-type="falsetto">ファルセット</button>
    <button class="palbtn" data-t="accent" data-type="accent">アクセント</button>
    <button class="palbtn" data-t="tame" data-type="tame">ため</button>
    <button class="palbtn" data-t="note" data-type="note">📝 メモ</button>
    <button class="palbtn" data-t="breath" data-type="breath">∨ この字の前にブレス</button>
    <button class="palbtn" data-t="close">キャンセル</button>
  </div>
</div>

<div id="cardOverlay">
  <div class="card-bar">
    <span id="cardTitle"></span>
    <span class="spacer"></span>
    <button id="cardFontDown" title="文字を小さく">A−</button>
    <button id="cardFontUp" title="文字を大きく">A＋</button>
    <button id="cardClose">✕ 閉じる</button>
  </div>
  <div id="cardLyrics"></div>
</div>

<div id="modalBack">
  <div id="searchModal">
    <div class="mhead">
      <b>🎵 曲をさがして追加</b>
      <div class="mrow">

<script>
(() => {
const STORE_KEY = 'utarepa.songs.v1';
const $ = id => document.getElementById(id);

const TYPE_LABEL = {
  shakuri: 'しゃくり', fall: 'フォール', kobushi: 'こぶし', vibrato: 'ビブラート',
  falsetto: 'ファルセット', accent: 'アクセント', tame: 'ため', note: 'メモ', breath: 'ブレス'
};
const TAG_CHOICES = ['盛り上がる', 'バラード', 'バンド', 'ボカロ', 'アイドル', '洋楽', 'アニソン', '練習中'];

let songs = load();
let current = null;        // 現在開いている曲オブジェクト
let popTarget = null;      // ポップオーバー対象のspan
let saveTimer = null;

/* ---------- 永続化 ---------- */
function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    // 以前入っていた使い方デモのサンプル曲は自動的に取り除く
    if (raw) return JSON.parse(raw).filter(s => !String(s.id).startsWith('sample-'));
  } catch (e) {}
  return [];
}
function persist(silent) {
  localStorage.setItem(STORE_KEY, JSON.stringify(songs));
  if (!silent) toast('保存しました');
}
function persistDebounced() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => persist(true), 600);
}

/* ---------- 一覧表示 ---------- */
function starsHtml(n) {
  let s = '';
  for (let i = 1; i <= 5; i++) s += `<span class="${i <= n ? '' : 'off'}">★</span>`;
  return `<span class="stars">${s}</span>`;
}
function renderList() {
  const q = $('search').value.trim().toLowerCase();
  const fs = $('filterStatus').value;
  const sort = $('sortBy').value;

  let list = songs.filter(s => {
    if (fs !== 'all' && !(s.tags || []).includes(fs)) return false;
    if (!q) return true;
    const hay = (s.title + ' ' + s.artist + ' ' + (s.tags || []).join(' ')).toLowerCase();
    return hay.includes(q);
  });
  const coll = new Intl.Collator('ja');
  if (sort === 'fav') list.sort((a, b) => (b.fav ? 1 : 0) - (a.fav ? 1 : 0) || b.created - a.created);
  else if (sort === 'rating') list.sort((a, b) => b.rating - a.rating);
  else if (sort === 'title') list.sort((a, b) => coll.compare(a.title, b.title));
  else if (sort === 'artist') list.sort((a, b) => coll.compare(a.artist, b.artist));
  else list.sort((a, b) => b.created - a.created);

  const grid = $('grid');
  grid.innerHTML = '';
  list.forEach(s => {
    const card = document.createElement('div');
    card.className = 'card' + (selected.has(s.id) ? ' selected' : '');
    card.onclick = () => { selectMode ? toggleSelect(s.id) : openSong(s.id); };

    const titlerow = document.createElement('div');
    titlerow.className = 'titlerow';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'selbox'; cb.checked = selected.has(s.id);
    const title = document.createElement('span');
    title.className = 'title'; title.textContent = s.title || '（無題）';
    titlerow.append(cb, title);
    if (s.fav) {
      const fav = document.createElement('span');
      fav.className = 'favmark'; fav.textContent = '⭐';
      titlerow.append(fav);
    }

    const artist = document.createElement('div');
    artist.className = 'artist';
    artist.innerHTML = `<span class="aname">${escapeHtml(s.artist || ' ')}</span>` + starsHtml(s.rating);
    card.append(titlerow, artist);
    grid.appendChild(card);
  });
  $('emptyMsg').hidden = list.length > 0;

  const favCount = songs.filter(s => s.fav).length;
  $('stats').textContent = `全${songs.length}曲｜⭐${favCount}曲`;
}
function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------- 詳細表示 ---------- */
function openSong(id) {
  current = songs.find(s => s.id === id);
  if (!current) return;
  $('f-title').value = current.title;
  $('f-artist').value = current.artist;
  document.querySelectorAll('#f-tagboxes input').forEach(cb => {
    cb.checked = (current.tags || []).includes(cb.dataset.tag);
  });
  $('f-tagboxes').classList.remove('show');
  updateTagBtn();
  renderFavBtn();
  $('f-key').value = current.key || '';
  $('f-tags').value = (current.tags || []).filter(t => !TAG_CHOICES.includes(t)).join(', ');
  $('f-memo').value = current.memo || '';
  drawRating(current.rating);
  $('lyrics').innerHTML = current.lyrics || '';
  setEditing(false);
  $('listView').hidden = true;
  $('detailView').hidden = false;
  window.scrollTo(0, 0);
}
function closeSong() {
  hidePopover();
  setEditing(false);
  current = null;
  $('detailView').hidden = true;
  $('listView').hidden = false;
  renderList();
}
$('backBtn').onclick = closeSong;

$('deleteBtn').onclick = () => {
  if (!current) return;
  if (!confirm(`「${current.title}」を削除しますか？`)) return;
  songs = songs.filter(s => s.id !== current.id);
  persist();
  closeSong();
};

function createSong(data) {
  const s = {
    id: 'song-' + Date.now() + '-' + Math.floor(Math.random() * 1e4),
    title: data.title || '', artist: data.artist || '', status: 'prac', key: '', rating: 0,
    tags: [], fav: false, memo: '', lyrics: '', created: Date.now()
  };
  songs.push(s);
  persist(true);
  return s;
}

/* ---------- デンモク風 曲検索モーダル ---------- */
$('addSong').onclick = () => {
  $('modalBack').classList.add('show');
  $('qTitle').value = '';
  $('qArtist').value = '';
  $('results').innerHTML = '<div class="empty" style="padding:30px 0">曲名かアーティスト名を入れて検索してください<br><span style="font-size:11px">アーティスト名だけで検索すると、その歌手の人気曲が一覧で出ます</span></div>';
  $('qTitle').focus();
};
function closeModal() {
  $('modalBack').classList.remove('show');

}
$('modalClose').onclick = closeModal;
$('modalBack').addEventListener('click', e => { if (e.target === $('modalBack')) closeModal(); });
$('manualAdd').onclick = () => {

};

/* まとめて追加（貼り付け一括登録） */
$('bulkAdd').onclick = () => {
  $('results').innerHTML = `
    <div style="padding:6px 10px">
      <div style="font-size:12px;color:var(--sub);margin-bottom:6px">
        1行に1曲、「曲名 / アーティスト」の形式で貼り付け（アーティスト省略OK）。<br>
        カラーシング等のレパートリーは、画面のスクショから読み取るか、曲名リストを貼り付けてください。
      </div>
      <div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px;font-size:12px">
        <label><input type="checkbox" id="bulkPair"> 曲名の次の行がアーティスト（2行で1曲）</label>
        <label><input type="checkbox" id="bulkLookup"> 曲名・アーティスト表記を自動補正（1曲3秒ほど）</label>
      </div>
      <div style="margin-bottom:8px">
        <button id="bulkImgBtn">📷 スクショから読み取り</button>
        <input type="file" id="bulkImg" accept="image/*" multiple hidden>
      </div>
      <textarea id="bulkText" style="width:100%;min-height:150px" placeholder="香水 / 瑛人&#10;Lemon / 米津玄師&#10;マリーゴールド"></textarea>
      <div style="display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap;font-size:12px">
        <label>タグ
          <select id="bulkTag">
            <option value="">なし</option>
            <option value="盛り上がる">盛り上がる</option>
            <option value="バラード">バラード</option>
            <option value="バンド">バンド</option>
            <option value="ボカロ">ボカロ</option>
            <option value="アイドル">アイドル</option>
            <option value="洋楽">洋楽</option>
            <option value="アニソン">アニソン</option>
            <option value="練習中">練習中</option>
          </select>
        </label>
        <button class="primary" id="bulkGo">追加する</button>
      </div>
      <div id="bulkProgress" style="font-size:12px;color:var(--sub);margin-top:6px"></div>
    </div>`;
  $('bulkGo').onclick = runBulkAdd;
  $('bulkImgBtn').onclick = () => $('bulkImg').click();
  $('bulkImg').addEventListener('change', e => {
    if (e.target.files.length) ocrImages([...e.target.files]);
    e.target.value = '';
  });
};

/* スクショ文字読み取り（Tesseract.js — 端末内で処理、画像は外部送信されない） */
let ocrWorkerPromise = null;
function loadTesseract() {
  if (window.Tesseract) return Promise.resolve();
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    s.onload = res;
    s.onerror = () => rej(new Error('load failed'));
    document.head.appendChild(s);
  });
}
async function getOcrWorker(onProgress) {
  await loadTesseract();
  if (!ocrWorkerPromise) {
    ocrWorkerPromise = (async () => {
      // 日本語＋英語（英語タイトルの曲の認識精度を上げる）
      const w = await Tesseract.createWorker('jpn+eng', 1, {
        logger: m => onProgress && onProgress(m)
      });
      // スクショは「1列のリスト」なのでそれ向けのモードにする
      await w.setParameters({ tessedit_pageseg_mode: '4', preserve_interword_spaces: '1' });
      return w;
    })();
  }
  return ocrWorkerPromise;
}

/* 読み取り前の画像補正：拡大・グレースケール・コントラスト強調・ダーク画面の反転 */
async function preprocessImage(file) {
  const img = await createImageBitmap(file);
  const scale = Math.max(1, 1500 / img.width);
  const canvas = document.createElement('canvas');
  canvas.width = Math.round(img.width * scale);
  canvas.height = Math.round(img.height * scale);
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
  const d = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const p = d.data;
  let sum = 0, n = 0;
  for (let i = 0; i < p.length; i += 40) { sum += p[i] * 0.299 + p[i + 1] * 0.587 + p[i + 2] * 0.114; n++; }
  const invert = (sum / n) < 128; // 暗い背景（ダークモードの画面）なら白黒反転
  for (let i = 0; i < p.length; i += 4) {
    let g = p[i] * 0.299 + p[i + 1] * 0.587 + p[i + 2] * 0.114;
    if (invert) g = 255 - g;
    g = Math.min(255, Math.max(0, (g - 128) * 1.5 + 128));
    p[i] = p[i + 1] = p[i + 2] = g;
  }
  ctx.putImageData(d, 0, 0);
  return canvas;
}
async function ocrImages(files) {
  const prog = $('bulkProgress');
  const btn = $('bulkImgBtn');
  btn.disabled = true;
  try {
    prog.textContent = '読み取りの準備中…（初回は日本語データのダウンロードに少し時間がかかります）';
    const worker = await getOcrWorker(m => {
      if (m.status && typeof m.progress === 'number' && m.progress < 1) {
        prog.textContent = `読み取りの準備中… ${Math.round(m.progress * 100)}%`;
      }
    });
    let allLines = [];
    for (let i = 0; i < files.length; i++) {
      prog.textContent = `${i + 1}/${files.length}枚目を読み取り中…`;
      const canvas = await preprocessImage(files[i]);
      const { data } = await worker.recognize(canvas);
      const lines = data.text.split('\n')
        .map(l => l.replace(/\s+/g, ' ').trim())
        .map(l => l.replace(/(?<=[　-鿿぀-ヿ＀-￯])\s+(?=[　-鿿぀-ヿ＀-￯])/g, ''))
        .filter(l => l.length >= 2)
        .filter(l => !/^(レパートリー|推し曲|マイページ|検索|すべて|編集|フォロー中?)$/.test(l));
      allLines = allLines.concat(lines);
    }
    if ($('bulkPair').checked) {
      const paired = [];
      for (let i = 0; i < allLines.length; i += 2) {
        paired.push(allLines[i] + (allLines[i + 1] ? ' / ' + allLines[i + 1] : ''));
      }
      allLines = paired;
    }
    const ta = $('bulkText');
    ta.value = (ta.value.trim() ? ta.value.trim() + '\n' : '') + allLines.join('\n');
    prog.textContent = '読み取り結果を上で確認・修正してから「追加する」を押してください（読み間違いは直せます）';
  } catch (err) {
    prog.textContent = '読み取りに失敗しました。ネット接続を確認するか、曲名を直接貼り付けてください。';
  }
  btn.disabled = false;
}

async function runBulkAdd() {
  const lines = $('bulkText').value.split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) { toast('曲を入力してください'); return; }
  const tag = $('bulkTag').value.trim();
  const lookup = $('bulkLookup').checked;
  $('bulkGo').disabled = true;
  let added = 0;
  for (let i = 0; i < lines.length; i++) {
    const parts = lines[i].split(/[\/／\t]/).map(s => s.trim()).filter(Boolean);
    let title = parts[0] || '';
    let artist = parts[1] || '';
    if (lookup && title) {
      $('bulkProgress').textContent = `${i + 1}/${lines.length}曲目を照会中… ${title}`;
      try {
        const d = await itunesSearch(title, artist);
        const hit = (d.results || [])[0];
        if (hit) {
          title = hit.trackName || title;
          artist = hit.artistName || artist;
        }
        // iTunes検索の回数制限（約20回/分）を超えないよう間隔をあける
        await new Promise(r => setTimeout(r, 3200));
      } catch (e) { /* 照会に失敗しても入力のまま追加する */ }
    }
    const s = createSong({ title, artist });
    if (tag) s.tags = [tag];
    added++;
  }
  persist(true);
  closeModal();
  renderList();
  toast(added + '曲を追加しました');
}
$('doSearch').onclick = doSearch;
$('qTitle').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
$('qArtist').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

/* iTunes Search API — fetch優先、失敗時はJSONPにフォールバック */
function normalizeTerm(t) {
  return t.replace(/　/g, ' ').replace(/\s+/g, ' ').trim();
}
function itunesUrl(term, cb, attribute) {
  return 'https://itunes.apple.com/search?term=' + encodeURIComponent(normalizeTerm(term)) +
    '&country=JP&media=music&entity=song&limit=100&lang=ja_jp' +
    (attribute ? '&attribute=' + attribute : '') +
    (cb ? '&callback=' + cb : '');
}

/* 曲名・アーティストを分けて検索（どちらか一方でもOK）
   曲名のみ → 曲名だけを対象に検索（songTerm）
   アーティストのみ → その歌手の曲一覧（artistTerm）
   両方 → まとめて検索し、improveResultsで並べ替え */
async function itunesSearch(title, artist) {
  title = normalizeTerm(title || '');
  artist = normalizeTerm(artist || '');
  const dz = { title, artist };
  let term, attribute = '';
  if (title && artist) { term = title + ' ' + artist; }
  else if (title) { term = title; attribute = 'songTerm'; }
  else { term = artist; attribute = 'artistTerm'; }
  let data = await itunesQuery(term, attribute, dz);
  // 絞った検索で0件なら、対象を広げてもう一度（表記ゆれ対策）
  if (attribute && !(data.results || []).length) {
    data = await itunesQuery(term, '', dz);
  }
  return data;
}

async function itunesQuery(term, attribute, dz) {
  // ① iTunesにfetchで問い合わせ
  try {
    const opts = {};
    if (typeof AbortSignal !== 'undefined' && AbortSignal.timeout) opts.signal = AbortSignal.timeout(10000);
    const res = await fetch(itunesUrl(term, null, attribute), opts);
    if (res.ok) return await res.json();
    if (res.status === 403 || res.status === 429) { const e = new Error('rate'); e.rate = true; throw e; }
  } catch (e) {
    if (e.rate) throw e;
  }
  // ② iTunesにJSONPで問い合わせ
  try { return await itunesSearchJsonp(term, attribute); } catch (e) {}
  // ③ Deezer（iTunesに繋がらない回線・コンテンツブロッカー環境向けの予備）
  return deezerSearch(dz);
}
let jsonpCount = 0;
function itunesSearchJsonp(term, attribute) {
  return new Promise((resolve, reject) => {
    const cb = '__itunesCb' + (++jsonpCount);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 12000);
    function cleanup() { delete window[cb]; script.remove(); clearTimeout(timer); }
    window[cb] = data => { cleanup(); resolve(data); };
    script.src = itunesUrl(term, cb, attribute);
    script.onerror = () => { cleanup(); reject(new Error('network')); };
    document.body.appendChild(script);
  });
}

/* Deezer検索（JSONP）— 結果をiTunesと同じ形に揃えて返す。曲名/アーティスト指定に対応 */
function deezerSearch(dz) {
  const clean = s => normalizeTerm(s || '').replace(/"/g, '');
  const t = clean(dz.title), a = clean(dz.artist);
  let query;
  if (t && a) query = `track:"${t}" artist:"${a}"`;
  else if (t) query = `track:"${t}"`;
  else query = `artist:"${a}"`;
  return new Promise((resolve, reject) => {
    const cb = '__dzCb' + (++jsonpCount);
    const script = document.createElement('script');
    const timer = setTimeout(() => { cleanup(); reject(new Error('timeout')); }, 12000);
    function cleanup() { delete window[cb]; script.remove(); clearTimeout(timer); }
    window[cb] = d => {
      cleanup();
      const results = (d.data || []).map(tr => ({
        trackName: tr.title_short || tr.title || '',
        artistName: (tr.artist && tr.artist.name) || '',
        collectionName: (tr.album && tr.album.title) || '',
        artworkUrl100: (tr.album && tr.album.cover_medium) || '',
        previewUrl: tr.preview || ''
      }));
      resolve({ resultCount: results.length, results });
    };
    script.src = 'https://api.deezer.com/search?q=' + encodeURIComponent(query) +
      '&limit=100&output=jsonp&callback=' + cb;
    script.onerror = () => { cleanup(); reject(new Error('network')); };
    document.body.appendChild(script);
  });
}

async function doSearch() {
  const qt = $('qTitle').value.trim();
  const qa = $('qArtist').value.trim();
  if (!qt && !qa) return;
  $('results').innerHTML = '<div class="empty" style="padding:30px 0">検索中…</div>';
  try {
    const data = await itunesSearch(qt, qa);
    renderResults(improveResults(data.results || [], qt, qa));
  } catch (err) {
    $('results').innerHTML = err.rate
      ? '<div class="empty" style="padding:30px 0">検索が混み合っています（回数制限）。<br>1〜2分待ってからもう一度お試しください。</div>'
      : '<div class="empty" style="padding:30px 0">検索できませんでした。ネット接続を確認してください。<br>「手入力で追加」も使えます。</div>';
  }
}

const previewAudio = new Audio();
let playingBtn = null;
function stopPreview() {
  previewAudio.pause();
  if (playingBtn) { playingBtn.textContent = '▶'; playingBtn = null; }
}
previewAudio.addEventListener('ended', stopPreview);

/* 検索結果の整理：カラオケ音源・オルゴール等の別バージョンを除き、
   同じ曲の重複をまとめ、検索語に曲名が一致する曲（＝目的の曲）を上に出す */
function improveResults(items, qTitle, qArtist) {
  const noise = /カラオケ|karaoke|オルゴール|orgel|music box|インスト|instrumental|off vocal|オフボーカル|ガイド(ボーカル|メロ)?無?|cover|カバー|歌ってみた|tribute|リミックス|remix|acoustic ver|ピアノver|bgm/i;
  const nt = normalizeTerm(qTitle || '').toLowerCase();
  const na = normalizeTerm(qArtist || '').toLowerCase();
  let list = items;
  if (!noise.test(nt + ' ' + na)) {
    const filtered = list.filter(it =>
      !noise.test((it.trackName || '') + ' ' + (it.artistName || '') + ' ' + (it.collectionName || '')));
    if (filtered.length) list = filtered;
  }
  const seen = new Set();
  list = list.filter(it => {
    const key = (it.trackName || '').toLowerCase() + '|' + (it.artistName || '').toLowerCase();
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  const tScore = it => {
    if (!nt) return 0;
    const t = (it.trackName || '').toLowerCase();
    if (t === nt) return 0;
    if (t.startsWith(nt)) return 1;
    if (t.includes(nt)) return 2;
    return 3;
  };
  const aScore = it => {
    if (!na) return 0;
    const a = (it.artistName || '').toLowerCase();
    if (a === na) return 0;
    if (a.startsWith(na)) return 1;
    if (a.includes(na)) return 2;
    return 3;
  };
  return list
    .map((it, i) => [aScore(it), tScore(it), i, it])
    .sort((x, y) => x[0] - y[0] || x[1] - y[1] || x[2] - y[2])
    .map(x => x[3]);
}

function renderResults(items) {
  const box = $('results');
  box.innerHTML = '';
  if (!items.length) {
    box.innerHTML = '<div class="empty" style="padding:30px 0">見つかりませんでした。<br>曲名だけで検索する／ひらがな・カタカナ・漢字の表記を変える、を試してみてください。<br>それでも無い曲は「手入力で追加」で登録できます。</div>';
    return;
  }
  items.forEach(it => {
    const row = document.createElement('div');
    row.className = 'result';
    const img = document.createElement('img');
    img.src = (it.artworkUrl100 || '').replace('100x100', '200x200');
    img.alt = '';
    const info = document.createElement('div');
    info.className = 'r-info';
    const t = document.createElement('div'); t.className = 'r-title'; t.textContent = it.trackName || '';
    const a = document.createElement('div'); a.className = 'r-artist'; a.textContent = it.artistName || '';
    const al = document.createElement('div'); al.className = 'r-album'; al.textContent = it.collectionName || '';
    info.append(t, a, al);
    row.append(img, info);
    if (it.previewUrl) {
      const pb = document.createElement('button');
      pb.className = 'previewBtn'; pb.textContent = '▶'; pb.title = '試聴（30秒）';
      pb.onclick = e => {
        e.stopPropagation();
        if (playingBtn === pb) { stopPreview(); return; }
        stopPreview();
        previewAudio.src = it.previewUrl;
        previewAudio.play();
        pb.textContent = '⏸'; playingBtn = pb;
      };
      row.appendChild(pb);
    }
    row.onclick = () => {
      closeModal();
      const s = createSong({ title: it.trackName, artist: it.artistName });
      openSong(s.id);
      toast('曲を追加しました。歌詞は「🔎」ボタンから探して貼り付けてください');
    };
    box.appendChild(row);
  });
}

/* ---------- 歌詞さがし（外部サイトを開くだけ＝合法） ---------- */

$('findLyricsGoogle').onclick = () => {

/* フィールド → モデル反映 */
function bindField(id, apply) {
  $(id).addEventListener('input', () => {
    if (!current) return;
    apply(current, $(id).value);
    persistDebounced();
  });
}
bindField('f-title', (s, v) => s.title = v);
bindField('f-artist', (s, v) => s.artist = v);
bindField('f-key', (s, v) => s.key = v);
bindField('f-memo', (s, v) => s.memo = v);
/* タグ：チェックボックス（固定の選択肢）＋自由入力の合算 */
function collectTags() {
  const chosen = [...document.querySelectorAll('#f-tagboxes input:checked')].map(cb => cb.dataset.tag);
  const custom = $('f-tags').value.split(/[,、]/).map(t => t.trim()).filter(Boolean).filter(t => !TAG_CHOICES.includes(t));
  return chosen.concat(custom);
}
TAG_CHOICES.forEach(t => {
  const lab = document.createElement('label');
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.dataset.tag = t;
  cb.addEventListener('change', () => {
    if (current) { current.tags = collectTags(); persistDebounced(); updateTagBtn(); }
  });
  lab.append(cb, ' ' + t);
  $('f-tagboxes').appendChild(lab);
});
$('f-tags').addEventListener('input', () => {
  if (current) { current.tags = collectTags(); persistDebounced(); updateTagBtn(); }
});
function updateTagBtn() {
  const chosen = current ? (current.tags || []).filter(t => TAG_CHOICES.includes(t)) : [];
  $('f-tagBtn').textContent = (chosen.length ? chosen.join('・') : 'タグを選ぶ') + ' ▾';
}
$('f-tagBtn').onclick = e => {
  e.stopPropagation();
  $('f-tagboxes').classList.toggle('show');
};
document.addEventListener('click', e => {
  if (!e.target.closest('.tagwrap')) $('f-tagboxes').classList.remove('show');
});

/* お気に入りON/OFF（詳細画面） */
function renderFavBtn() {
  $('favBtn').textContent = current && current.fav ? '⭐ お気に入り中' : '☆ お気に入り';
}
$('favBtn').onclick = () => {
  if (!current) return;
  current.fav = !current.fav;
  renderFavBtn();
  persistDebounced();
  toast(current.fav ? 'お気に入りにしました' : 'お気に入りを解除しました');
};

/* 星評価 */
function drawRating(n) {
  [...$('f-rating').children].forEach((el, i) => el.classList.toggle('on', i < n));
}
$('f-rating').addEventListener('click', e => {
  if (e.target.tagName !== 'SPAN' || !current) return;
  const idx = [...$('f-rating').children].indexOf(e.target) + 1;
  current.rating = (current.rating === idx) ? idx - 1 : idx; // 同じ星をもう一度押すと1つ減らせる
  drawRating(current.rating);
  persistDebounced();
});

/* ---------- 歌詞編集・注釈 ---------- */
const lyricsEl = $('lyrics');
let editing = false;

function setEditing(on) {
  editing = on;
  lyricsEl.contentEditable = on;
  lyricsEl.classList.toggle('editing', on);
  $('editLyricsBtn').textContent = on ? '✅ 編集を終了' : '✏️ 歌詞を編集';
  $('lyricsTools').classList.toggle('show', on);
  if (on) { hidePopover(); hideTapPalette(); lyricsEl.focus(); }
}
$('editLyricsBtn').onclick = () => setEditing(!editing);

/* 歌詞カード全画面表示（書き込んだ印もそのまま大きく表示） */
let cardFont = 16;
function applyCardFont() {
  cardFont = Math.max(16, Math.min(48, cardFont));
  $('cardLyrics').style.fontSize = cardFont + 'px';
}
$('lyricsCardBtn').onclick = () => {
  if (!current) return;
  if (editing) saveLyrics();
  setEditing(false);
  $('cardTitle').textContent = (current.title || '（無題）') + (current.key ? '　key: ' + current.key : '');
  // 表示中の歌詞DOM（印つき）をそのまま大きく表示。開いたときは一番小さい文字で全体を見渡せるように
  cardFont = 16;
  $('cardLyrics').innerHTML = lyricsEl.innerHTML || current.lyrics || '';
  applyCardFont();
  $('cardOverlay').classList.add('show');
};
$('cardClose').onclick = () => $('cardOverlay').classList.remove('show');
$('cardFontUp').onclick = () => { cardFont += 3; applyCardFont(); };
$('cardFontDown').onclick = () => { cardFont -= 3; applyCardFont(); };

lyricsEl.addEventListener('input', () => {
  if (current) { current.lyrics = lyricsEl.innerHTML; persistDebounced(); }
});
/* プレーンテキストとして貼り付け */
lyricsEl.addEventListener('paste', e => {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text');
  document.execCommand('insertText', false, text);
});

function saveLyrics() {
  if (current) { current.lyrics = lyricsEl.innerHTML; persistDebounced(); }
}

/* 注釈ボタン */
document.querySelectorAll('.annbtn').forEach(btn => {
  btn.addEventListener('click', () => applyAnnotation(btn.dataset.type));
});

function selectionInLyrics() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return null;
  const range = sel.getRangeAt(0);
  const node = range.commonAncestorContainer;
  const el = node.nodeType === 1 ? node : node.parentElement;
  return lyricsEl.contains(el) ? { sel, range } : null;
}

function applyAnnotation(type) {
  const ctx = selectionInLyrics();

  if (type === 'breath') {
    // カーソル位置（または選択の先頭）にブレス記号を挿入
    if (!ctx) { toast('歌詞の中で挿入したい位置をクリックしてから押してください'); return; }
    const span = document.createElement('span');
    span.className = 'breath'; span.dataset.type = 'breath'; span.textContent = '∨';
    const r = ctx.range;
    r.collapse(true);
    r.insertNode(span);
    ctx.sel.removeAllRanges();
    saveLyrics();
    return;
  }

  if (!ctx || ctx.sel.isCollapsed) {
    toast('先に歌詞の文字をドラッグで選択してください');
    return;
  }

  let noteText = '';
  if (type === 'note') {
    noteText = prompt('この箇所のメモを入力：');
    if (noteText === null) return;
  }

  const span = document.createElement('span');
  span.className = 'ann ann-' + type;
  span.dataset.type = type;
  if (noteText) span.dataset.note = noteText;

  const range = ctx.range;
  try {
    range.surroundContents(span);
  } catch (e) {
    // 選択が既存の印をまたぐ場合
    const frag = range.extractContents();
    span.appendChild(frag);
    range.insertNode(span);
  }
  ctx.sel.removeAllRanges();
  saveLyrics();
}

/* 印クリック → ポップオーバー */
lyricsEl.addEventListener('click', e => {
  if (editing) return;
  const target = e.target.closest('.ann, .breath');
  if (target) { hideTapPalette(); showPopover(target, e); return; }
  hidePopover();
  // ドラッグで範囲選択しているときはタップ扱いにしない（上のボタンで印を付ける）
  const sel = window.getSelection();
  if (sel && !sel.isCollapsed) { hideTapPalette(); return; }
  // 文字を1タップ → その文字に印を付けるパレットを出す
  let node, offset;
  if (document.caretRangeFromPoint) {
    const r = document.caretRangeFromPoint(e.clientX, e.clientY);
    if (r) { node = r.startContainer; offset = r.startOffset; }
  } else if (document.caretPositionFromPoint) {
    const pos = document.caretPositionFromPoint(e.clientX, e.clientY);
    if (pos) { node = pos.offsetNode; offset = pos.offset; }
  }
  if (!node || node.nodeType !== 3 || !lyricsEl.contains(node)) { hideTapPalette(); return; }
  let start = Math.min(offset, node.length - 1);
  if (start < 0) { hideTapPalette(); return; }
  const ch = node.textContent[start];
  if (!ch || /\s/.test(ch)) { hideTapPalette(); return; }
  tapTarget = { node, start };
  $('tapChar').textContent = ch;
  const pal = $('tapPalette');
  pal.style.display = 'block';
  const x = Math.min(e.pageX, document.documentElement.clientWidth - 330);
  pal.style.left = Math.max(8, x) + 'px';
  pal.style.top = (e.pageY + 14) + 'px';
});

/* タップパレット（歌詞カード作り） */
let tapTarget = null;
function hideTapPalette() { $('tapPalette').style.display = 'none'; tapTarget = null; }
document.querySelectorAll('#tapPalette .palbtn').forEach(btn => {
  btn.addEventListener('click', () => {
    const t = btn.dataset.t;
    if (t === 'close' || !tapTarget) { hideTapPalette(); return; }
    const { node, start } = tapTarget;
    const range = document.createRange();
    if (t === 'breath') {
      range.setStart(node, start);
      range.collapse(true);
      const span = document.createElement('span');
      span.className = 'breath'; span.dataset.type = 'breath'; span.textContent = '∨';
      range.insertNode(span);
    } else {
      let noteText = '';
      if (t === 'note') {
        noteText = prompt('この箇所のメモを入力：');
        if (noteText === null) { hideTapPalette(); return; }
      }
      range.setStart(node, start);
      range.setEnd(node, Math.min(start + 1, node.length));
      const span = document.createElement('span');
      span.className = 'ann ann-' + t; span.dataset.type = t;
      if (noteText) span.dataset.note = noteText;
      try { range.surroundContents(span); } catch (err) {}
    }
    hideTapPalette();
    saveLyrics();
  });
});

function showPopover(span, e) {
  popTarget = span;
  const type = span.dataset.type || 'note';
  const pop = $('popover');
  pop.querySelector('.ptype').textContent = '🎵 ' + (TYPE_LABEL[type] || type);
  const noteEl = pop.querySelector('.pnote');
  noteEl.textContent = span.dataset.note || '';
  noteEl.style.display = span.dataset.note ? '' : 'none';
  $('popEdit').style.display = (type === 'breath') ? 'none' : '';
  pop.style.display = 'block';
  const x = Math.min(e.pageX, document.documentElement.clientWidth - 280);
  pop.style.left = Math.max(8, x) + 'px';
  pop.style.top = (e.pageY + 12) + 'px';
}
function hidePopover() { $('popover').style.display = 'none'; popTarget = null; }

$('popClose').onclick = hidePopover;
$('popRemove').onclick = () => {
  if (!popTarget) return;
  if (popTarget.classList.contains('breath')) {
    popTarget.remove();
  } else {
    // spanを外して中身だけ残す
    const parent = popTarget.parentNode;
    while (popTarget.firstChild) parent.insertBefore(popTarget.firstChild, popTarget);
    popTarget.remove();
    parent.normalize();
  }
  hidePopover();
  saveLyrics();
};
$('popEdit').onclick = () => {
  if (!popTarget) return;
  const t = prompt('メモを編集：', popTarget.dataset.note || '');
  if (t === null) return;
  if (t) popTarget.dataset.note = t; else delete popTarget.dataset.note;
  hidePopover();
  saveLyrics();
};
document.addEventListener('click', e => {
  if (!e.target.closest('#popover') && !e.target.closest('#lyrics')) hidePopover();
  if (!e.target.closest('#tapPalette') && !e.target.closest('#lyrics')) hideTapPalette();
});

/* ---------- 検索・並び替え（並び順と絞り込みは次回起動時も保持） ---------- */
const savedSort = localStorage.getItem('utarepa.sort');
if (savedSort && [...$('sortBy').options].some(o => o.value === savedSort)) $('sortBy').value = savedSort;
const savedFilter = localStorage.getItem('utarepa.filter');
if (savedFilter && [...$('filterStatus').options].some(o => o.value === savedFilter)) $('filterStatus').value = savedFilter;
['search', 'filterStatus', 'sortBy'].forEach(id => {
  $(id).addEventListener('input', () => {
    localStorage.setItem('utarepa.sort', $('sortBy').value);
    localStorage.setItem('utarepa.filter', $('filterStatus').value);
    renderList();
  });
});

/* ---------- バックアップ保存 / 復元 ---------- */
$('menuExport').onclick = () => {
  const blob = new Blob([JSON.stringify(songs, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  const d = new Date();
  const stamp = d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
  a.href = URL.createObjectURL(blob);
  a.download = `utarepa-backup-${stamp}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('バックアップファイルを保存しました。別の端末では「📂 復元」で読み込めます');
};
$('menuImport').onclick = () => $('importFile').click();
$('importFile').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!Array.isArray(data)) throw new Error();
      if (!confirm(`${data.length}曲のデータを読み込みます。この端末の現在のデータは置き換えられます。よろしいですか？`)) return;
      songs = data;
      persist();
      renderList();
    } catch (err) {
      alert('読み込めませんでした。「💾 バックアップ保存」で作ったファイル(.json)を選んでください。');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

/* ---------- toast ---------- */
let toastTimer;
function toast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* PWA: Service Worker登録（file://では無効） */
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
}

/* ---------- 選択モード（一括削除） ---------- */
let selectMode = false;
const selected = new Set();
function setSelectMode(on) {
  selectMode = on;
  if (!on) selected.clear();
  document.body.classList.toggle('selecting', on);
  $('selectBtn').textContent = on ? '選択中…' : '選択';
  updateSelCount();
  renderList();
}
function toggleSelect(id) {
  selected.has(id) ? selected.delete(id) : selected.add(id);
  updateSelCount();
  renderList();
}
function updateSelCount() { $('selCount').textContent = selected.size + '曲選択中'; }
$('selectBtn').onclick = () => setSelectMode(!selectMode);
$('cancelSelect').onclick = () => setSelectMode(false);
$('deleteSelected').onclick = () => {
  if (!selected.size) { toast('削除する曲をタップして選んでください'); return; }
  if (!confirm(selected.size + '曲を削除します。よろしいですか？')) return;
  songs = songs.filter(s => !selected.has(s.id));
  persist();
  setSelectMode(false);
};
$('favSelected').onclick = () => {
  if (!selected.size) { toast('お気に入りにする曲をタップして選んでください'); return; }
  // 選んだ曲が全部お気に入りなら解除、そうでなければお気に入りに設定
  const sel = songs.filter(s => selected.has(s.id));
  const makeFav = !sel.every(s => s.fav);
  sel.forEach(s => s.fav = makeFav);
  persist(true);
  toast(makeFav ? selected.size + '曲をお気に入りにしました' : 'お気に入りを解除しました');
  setSelectMode(false);
};

/* ---------- ホームボタン：どこからでも曲一覧の先頭へ ---------- */
$('homeBtn').onclick = () => {
  $('cardOverlay').classList.remove('show');
  closeModal();
  if (selectMode) setSelectMode(false);
  $('search').value = '';
  $('filterStatus').value = 'all';
  localStorage.setItem('utarepa.filter', 'all');
  if (!$('detailView').hidden) closeSong();
  renderList();
  window.scrollTo(0, 0);
};

/* ---------- 文字サイズ切り替え（標準⇔小） ---------- */
if (localStorage.getItem('utarepa.compact') === '1') document.body.classList.add('compact');
$('fontToggle').onclick = () => {
  const on = document.body.classList.toggle('compact');
  localStorage.setItem('utarepa.compact', on ? '1' : '0');
  toast(on ? '文字サイズ：小（たくさん表示）' : '文字サイズ：標準');
};

/* 初期表示 */
persist(true);
renderList();
})();
